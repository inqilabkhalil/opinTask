<body>

  <!-- ========================
       INTRO EKRANı
  ======================== -->
  <div id="intro" class="intro">
    <canvas id="particle-canvas"></canvas>

    <div class="intro-center">
      <div id="envelope-wrapper" class="envelope-wrapper">
        <div class="envelope" id="envelope">
          <div class="env-back"></div>
          <div class="env-flap-side env-flap-l"></div>
          <div class="env-flap-side env-flap-r"></div>
          <div class="env-flap-btm"></div>
          <div class="env-letter" id="env-letter">
            <div class="env-letter-content">
              <div class="env-letter-names">I &amp; Z</div>
              <div class="env-letter-hr"></div>
              <div class="env-letter-sub">Dəvətnamə</div>
            </div>
          </div>
          <div class="env-flap-top" id="env-flap-top"></div>
          <div class="env-seal" id="env-seal">&#10084;</div>
        </div>
      </div>
      <p class="intro-hint">Aç</p>
    </div>
  </div>

  ======================== -->

    <!-- DAVƏTİYYƏ MƏTNİ -->
    <section class="invite-section fade-up">
      <p class="invite-body">
        Ən gözəl gecəmizdə sizi də aramızda görmək istəyirik.
      </p>
    </section>

    <!-- AİLƏLƏR -->
    <section class="families-section fade-up">
      <div class="family-block">
        <div class="family-name">AİLƏ 1<br/>AİLƏSİ.</div>
      </div>
      <div class="family-sep">&amp;</div>
      <div class="family-block">
        <div class="family-name">AİLƏ 2<br/>AİLƏSİ</div>
      </div>
    </section>

    <!-- QIZIL XƏTT -->

    <!-- TARİX + SAAT -->

      <div class="datetime-date">
        <span class="dt-day">14</span>
        <span class="dt-month">Fevral</span>
      </div>
      <div class="datetime-time">
        <span class="dt-label">SAAT |</span>
        <span class="dt-val">19:00</span>

    <!-- MƏKAN -->
